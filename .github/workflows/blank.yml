name: Caza de la Bestia Oracle

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta automáticamente cada hora
  workflow_dispatch: # Permite activarlo manualmente

jobs:
  cazar:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar OCI CLI
        run: |
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Configurar OCI y Generar Llave Pública
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=~/.oci/key.pem" >> ~/.oci/config
          
          # Cargar la llave privada
          echo "${{ secrets.OCI_KEY_CONTENT }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem

          # EXTRAER LA LLAVE PÚBLICA AUTOMÁTICAMENTE
          ssh-keygen -y -f ~/.oci/key.pem > ~/.oci/id_rsa.pub

      - name: Intentar crear la Bestia (ARM 4 OCPU / 24GB RAM)
        continue-on-error: true # Evita que el workflow aparezca como rojo si Oracle dice que NO
        run: |
          echo "Lanzando petición a Oracle Monterrey..."
          
          RESPONSE=$(oci compute instance launch \
            --availability-domain "${{ secrets.OCI_AD }}" \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memory_in_gbs":24}' \
            --assign-public-ip true \
            --display-name "LaBestiaAnyelo" \
            --image-id "${{ secrets.OCI_IMAGE_ID }}" \
            --ssh-authorized-keys-file ~/.oci/id_rsa.pub \
            --subnet-id "${{ secrets.OCI_SUBNET_ID }}" 2>&1)

          if [[ $RESPONSE == *"Out of capacity"* ]]; then
            echo "❌ Fallo táctico: No hay inventario disponible. Reintentando en la próxima hora."
          elif [[ $RESPONSE == *"LimitExceeded"* ]]; then
            echo "⚠️ Límite excedido: ¿Quizás ya tienes una instancia creada?"
            exit 1
          else
            echo "✅ ¡LA BESTIA HA SIDO DOMADA!"
            echo "$RESPONSE"
          fi
